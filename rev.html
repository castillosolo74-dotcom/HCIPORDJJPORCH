<html>

<head>

</head>

<body>
    <h1>string manipulation</h1>
    <p id="s1"></p>
    <p id="s2"></p>
    <p id="s3"></p>
    <p id="s4"></p>
    <p id="s5"></p>
    <p id="s6"></p>
    <p id="s7"></p>
    <p id="s8"></p>
    <p id="s9"></p>
    <p id="s10"></p>
    <p id="s11"></p>
    <p id="s12"></p>
    <p id="s13"></p>
    <p id="s14"></p>
    <p id="s15"></p>
    <p id="s16"></p>
    <p id="s17"></p>
    <p id="s18"></p>
    <p id="s19"></p>
    <p id="s20"></p>

    <script>
        let text = "epiophenomenalism of java extrsa ordinarsa magindanao";
        let newText = text.replace("java", "javasss");
        document.getElementById("s1").innerHTML = text.length;
        document.getElementById("s2").innerHTML = text.includes("javasss");
        document.getElementById("s3").innerHTML = text.toUpperCase();
        document.getElementById("s4").innerHTML = text.slice(0, 5);
        document.getElementById("s5").innerHTML = newText;
        document.getElementById("s6").innerHTML = text.split(" ");
        document.getElementById("s7").innerHTML = text.trim();
        document.getElementById("s8").innerHTML = text.trim().toUpperCase().replace("OF", "AND");

        let html = "  hello world   ";
        document.getElementById("s9").innerHTML = html.trim().toUpperCase().replace("WORLD", "JAVANOCHIS");
        document.getElementById("s10").innerHTML = html.toUpperCase();
        document.getElementById("s11").innerHTML = html.replace("world", "javanochis")

        let users = 'dave castillo';

        document.getElementById("s12").innerHTML = users.length;// kung gano karami ang char or index sa string
        document.getElementById("s13").innerHTML = users.includes('castillo');//aalamin kung andon sya sa string (true or dfalse)
        document.getElementById("s14").innerHTML = users.slice(0, 4);// means ano sya o index 0 to 4 (dave) yung una yun ung unana at hanggang saan

        let words = " i love programming in javascript ";
        document.getElementById("s15").innerHTML = words.split(" ");
        document.getElementById("s16").innerHTML = words.length;
        document.getElementById("s17").innerHTML = words.split(" ").join("-");
        document.getElementById("s18").innerHTML = words.split(" ").reverse().join(" ");
        document.getElementById("s19").innerHTML = words.concat(" ", users);
        document.getElementById("s20").innerHTML = words.concat(" ", users).toUpperCase();



    </script>
</body>

</html>
