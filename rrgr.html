<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profile-card {
      background: #fff;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      padding: 20px;
    }

    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .profile-card h2 {
      margin: 10px 0 5px;
    }

    .profile-card p {
      color: #666;
      font-size: 14px;
    }

    .info {
      margin-top: 15px;
      text-align: left;
    }

    .info p {
      margin: 5px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #4f46e5;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
    }

    .btn:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img src="https://via.placeholder.com/100" alt="Profile Picture">
    <h2>John Doe</h2>
    <p>Web Developer</p>

    <div class="info">
      <p><strong>Email:</strong> johndoe@email.com</p>
      <p><strong>Phone:</strong> +123 456 7890</p>
      <p><strong>Location:</strong> Philippines</p>
    </div>

    <a href="#" class="btn">Contact</a>
  </div>

</body>
</html>
